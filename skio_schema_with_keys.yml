      description: Total discounts queued to reduce future subscription revenue.
      data_type: FLOAT
    - name: subscriptionLocalQueuedRevenue
      description: Local currency value of subscription revenue that is queued for
        processing or recognition.
      data_type: FLOAT
    - name: subscriptionLocalQueuedRevenueDiscounts
      description: The total value of local discounts applied to subscription revenue
        that is queued for future recognition.
      data_type: FLOAT
    - name: localNextBillingDate
      description: The next scheduled date for a subscription payment, represented
        in the subscription's local timezone.
      data_type: DATETIME
    - name: storefrontUserEmail
      description: Email address of the storefront user associated with a subscription
        analytics cohort.
      data_type: VARCHAR
    - name: ianaTimeZone
      description: The IANA time zone identifier specifying the geographical time
        zone relevant to the analytics subscription or cohort.
      data_type: VARCHAR
    - name: localSubscriptionStartedAt
      description: Timestamp of when a user's subscription to a local service or offering
        began.
      data_type: DATETIME
    - name: hasVolumeDiscount
      description: Indicates whether the analytics subscription for this cohort has
        a volume discount applied.
      data_type: BOOLEAN
    - name: remainingCyclesUntilRenewal
      description: The number of billing cycles remaining until the analytics subscription
        for this specific cohort automatically renews.
      data_type: INTEGER
    - name: nextRenewalDate
      description: The upcoming date when the analytics subscription for the cohort
        is due for renewal.
      data_type: TIMESTAMP
    - name: cohortDate
      description: The date that defines the specific user cohort, typically representing
        their initial subscription or signup date.
      data_type: DATE
    - name: segmentId
      description: The unique identifier for a customer segment analyzed within the
        cohort's subscription data.
      data_type: VARCHAR
    - name: revenueAllTime
      description: The total revenue generated from all subscriptions belonging to
        this cohort since its creation.
      data_type: FLOAT
    - name: revenueAllTimeDiscount
      description: The cumulative monetary value of all discounts applied to subscriptions
        for this specific cohort since their inception.
      data_type: FLOAT
    - name: revenue3Month
      description: The total revenue generated from subscriptions by a specific user
        cohort over a three-month period.
      data_type: FLOAT
    - name: revenue3MonthDiscount
      description: Revenue generated over a three-month period, net of any applied
        discounts.
      data_type: FLOAT
    - name: revenue6Month
      description: The total subscription revenue generated by the cohort within a
        six-month period.
      data_type: FLOAT
    - name: revenue6MonthDiscount
      description: The total discounted revenue generated over a six-month period.
      data_type: FLOAT
    - name: revenue12Month
      description: The total revenue generated by a specific cohort of Analytics subscribers
        over a 12-month period.
      data_type: FLOAT
    - name: revenue12MonthDiscount
      description: Total revenue generated from subscriptions within a cohort over
        a 12-month period, net of any applied discounts.
      data_type: FLOAT
    - name: orderCountAllTime
      description: The sum of all orders placed by subscribers within a specific cohort
        since its inception.
      data_type: INTEGER
    - name: daysActive
      description: The total number of days a subscriber cohort has been active.
      data_type: INTEGER
    - name: quantityTotal
      description: The total quantity of subscribed items or services for the analytics
        cohort.
      data_type: INTEGER
    - name: lineCountTotal
      description: The total number of lines of data, code, or content recorded for
        the specific cohort's analytics subscription.
      data_type: INTEGER
    - name: isCancelledOnSameDay
      description: Indicates whether the analytics subscription was cancelled on the
        same day it was initiated.
      data_type: BOOLEAN
    - name: isCancelledBeforeSecondOrder
      description: Boolean flag indicating whether a subscription was cancelled after
        its first order but before a second order occurred.
      data_type: BOOLEAN
    - name: firstCancellationDate
      description: This column records the date when a subscription belonging to this
        cohort was first cancelled.
      data_type: DATE
    - name: lastCancellationDate
      description: The date of the most recent subscription cancellation across all
        subscriptions within the cohort.
      data_type: DATE
    - name: secondOrderLocalCreatedAtDate
      description: The local date a subsequent record or event related to the analytics
        subscription for the cohort was created.
      data_type: DATE
    - name: secondOrderLocalCreatedAt
      description: The local time a user in the cohort created their second or subsequent
        subscription.
      data_type: DATETIME
  - name: AuditLog
    type: table
    description: Records all user actions and system changes for auditing, compliance,
      and historical review.
    columns:
    - name: id
      description: A unique identifier for each entry in the audit log. Primary key.
      data_type: VARCHAR
      primary_key: true
    - name: eventType
      description: Identifies the category or type of action recorded in the audit
        log.
      data_type: VARCHAR
    - name: eventData
      description: The specific data and details related to the recorded audit event.
      data_type: VARCHAR
    - name: subscriptionId
      description: The unique identifier for the subscription associated with the
        audit log entry. Joins to Subscription.id.
      data_type: VARCHAR
      foreign_key: Subscription.id
    - name: createdAt
      description: The date and time this audit log entry was created.
      data_type: VARCHAR
    - name: updatedAt
      description: Timestamp of the last modification to this audit log record.
      data_type: VARCHAR
    - name: storefrontUserId
      description: Identifies the user who performed the audited action. Joins to
        StorefrontUser.id.
      data_type: VARCHAR
      foreign_key: StorefrontUser.id
    - name: domain
      description: Identifies the logical domain or subsystem affected by the audited
        event.
      data_type: VARCHAR
    - name: eventDataParsed
      description: The structured, machine-readable data representing the audit event,
        derived from its original raw form.
      data_type: 'NULL'
    - name: siteId
      description: A unique identifier representing the site where the logged action
        originated. Joins to Site.id.
      data_type: VARCHAR
      foreign_key: Site.id
    - name: localCreatedAt
      description: The timestamp indicating when this audit log entry was created
        on the local system.
      data_type: DATETIME
  - name: BillingAttempt
    type: table
    description: Stores data for each instance of an attempt to bill a customer or
      account.
    columns:
    - name: id
      description: A unique identifier for each individual billing attempt. Primary
        key.
      data_type: VARCHAR
      primary_key: true
    - name: createdAt
      description: The date and time the billing attempt record was created.
      data_type: VARCHAR
    - name: updatedAt
      description: The date and time this specific billing attempt record was last
        modified in the system.
      data_type: VARCHAR
    - name: platformId
      description: Unique identifier for the platform associated with the billing
        attempt (e.g., Shopify billing attempt ID).
      data_type: VARCHAR
    - name: orderId
      description: The unique identifier of the order this billing attempt is associated
        with. Joins to Order.id.
      data_type: VARCHAR
      foreign_key: Order.id
    - name: subscriptionId
      description: Uniquely identifies the subscription associated with this billing
        attempt. Joins to Subscription.id.
      data_type: VARCHAR
      foreign_key: Subscription.id
    - name: errorCode
      description: The specific code indicating why the billing attempt failed.
      data_type: VARCHAR
    - name: errorMessage
      description: Contains the specific error message generated when a billing attempt
        fails.
      data_type: VARCHAR
    - name: billingAttemptedAt
      description: The date and time when the system initiated an attempt to bill
        a customer.
      data_type: VARCHAR
    - name: orderPlatformId
      description: Identifies the platform order ID on which the order prompting this
        billing attempt was placed.
      data_type: VARCHAR
    - name: subscriptionBillingDate
      description: The scheduled or actual date for processing a subscription's recurring
        payment.
      data_type: VARCHAR
    - name: stateContext
      description: Provides specific details or contextual information about the current
        state of the billing attempt.
      data_type: VARCHAR
    - name: idempotencyKey
      description: Uniquely identifies a billing attempt request to ensure it is processed
        only once, preventing duplicate charges.
      data_type: VARCHAR
    - name: source
      description: Identifies the system or process that initiated this specific billing
        attempt.
      data_type: VARCHAR
    - name: nextActionUrl
      description: The URL where the user or system should be directed to take the
        next required action for this billing attempt.
      data_type: VARCHAR
  - name: CancelFlowV2Session
    type: table
    description: Stores data related to individual sessions within the version 2 cancellation
      workflow.
    columns:
    - name: id
      description: A unique identifier for each session of the CancelFlowV2 process.
        Primary key.
      data_type: VARCHAR
      primary_key: true
    - name: created_at
      description: The date and time this CancelFlowV2Session was initiated.
      data_type: VARCHAR
    - name: updated_at
      description: Records the exact time this cancel flow V2 session was last updated.
      data_type: VARCHAR
    - name: cancelFlowId
      description: A unique identifier for a specific instance of a cancellation process.
      data_type: VARCHAR
    - name: subscriptionId
      description: Identifies the subscription that is the subject of this cancellation
        flow session. Joins to Subscription.id.
      data_type: VARCHAR
      foreign_key: Subscription.id
    - name: reasonId
      description: The unique identifier specifying the underlying reason for a cancellation
        event within the CancelFlowV2Session.
      data_type: VARCHAR
    - name: reason
      description: The specific reason or explanation provided for the cancellation
        event within the CancelFlowV2Session.
      data_type: VARCHAR
    - name: rebuttalId
      description: The identifier for the specific retention offer or counter-argument
        presented to the user during a cancellation flow session.
      data_type: VARCHAR
    - name: rebuttal
      description: Stores the response provided to either a customer's stated reason
        for cancellation or to a retention offer presented during the cancellation
        session.
      data_type: VARCHAR
    - name: shownReasons
      description: The reasons for cancellation presented to the user during this
        CancelFlowV2Session.
      data_type: VARCHAR
    - name: shownRebuttals
      description: Records the specific retention offers or persuasive arguments displayed
        to the user during the cancellation flow session.
      data_type: VARCHAR
    - name: action
      description: Records the specific step or event occurring during the cancellation
        flow session.
      data_type: VARCHAR
    - name: status
      description: Indicates the current processing state or final outcome of the
        CancelFlowV2 session.
      data_type: VARCHAR
    - name: rebuttalOptions
      description: The set of counter-offers or alternative actions presented to a
        user during a cancellation flow to encourage retention.
      data_type: VARCHAR
    - name: conditions
      description: Records the specific criteria, rules, or states encountered or
        evaluated during the cancellation flow session.
      data_type: VARCHAR
    - name: migratedFromSession
      description: The identifier of the CancelFlowV2Session from which this session
        was migrated or continued. Self-join to CancelFlowV2Session.id.
      data_type: VARCHAR
    - name: migratedFromSite
      description: The source site from which the user's account or session was migrated.
        Joins to Site.id.
      data_type: VARCHAR
      foreign_key: Site.id
    - name: isOtherReason
      description: Indicates whether the user selected 'Other' as the reason for cancellation
        during the CancelFlowV2Session.
      data_type: BOOLEAN
    - name: shownActions
      description: Lists the specific actions or choices presented to the user during
        a CancelFlowV2Session.
      data_type: VARCHAR
    - name: isMultipleActions
      description: Indicates if the user performed more than one action within the
        cancel flow session.
      data_type: BOOLEAN
    - name: actions
      description: Stores the chronological record of user and system activities performed
        within the CancelFlowV2 session.
      data_type: VARCHAR
    - name: siteId
      description: The unique identifier for the site where the cancellation flow
        session was initiated. Joins to Site.id.
      data_type: VARCHAR
      foreign_key: Site.id
    - name: isSplashScreen
      description: Identifies if the initial screen displayed during the CancelFlowV2
        session was a splash screen.
      data_type: BOOLEAN
    - name: conditionsV2
      description: The set of conditions or criteria associated with the CancelFlowV2Session.
      data_type: VARCHAR
    - name: actionsV2
      description: Records the specific actions performed by users and the system
        throughout a CancelFlowV2 session.
      data_type: VARCHAR
    - name: actionsV2MultiStep
      description: Represents the multi-step action sequence associated with a V2
        cancellation flow session.
      data_type: VARCHAR
    - name: reasonPath
      description: The sequence of reasons a user selected during the cancellation
        flow.
      data_type: VARCHAR
    - name: statusContext
      description: Describes the specific context or reasons associated with the current
        status of the cancellation flow session.
      data_type: VARCHAR
  - name: CancelFlowV3Session
    type: table
    description: This table records the status and details for each session processed
      by the third version of the cancellation workflow.
    columns:
    - name: id
      description: Uniquely identifies each individual session within the CancelFlowV3
