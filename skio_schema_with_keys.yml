    - name: versionNumber
      description: Identifies the specific version of the CancelFlowV3 process that
        handled this session.
      data_type: INTEGER
    - name: cancelFlowId
      description: The identifier for the specific cancellation flow being tracked
        by this session.
      data_type: VARCHAR
    - name: siteId
      description: The unique identifier for the site where the cancellation flow
        session originated.
      data_type: VARCHAR
    - name: type
      description: Specifies the category or nature of the cancellation flow session.
      data_type: VARCHAR
    - name: pathTaken
      description: The specific sequence of interactions or pages encountered by a
        user during a cancellation flow session.
      data_type: VARCHAR
    - name: createdAt
      description: Records the exact timestamp when this cancellation flow session
        was first initiated.
      data_type: VARCHAR
    - name: updatedAt
      description: The timestamp indicating when the CancelFlowV3Session record was
        last updated.
      data_type: VARCHAR
    - name: status
      description: Reflects the current state or completion status of the user's cancellation
        flow session.
      data_type: VARCHAR
  - name: DailyAggregateTable
    type: table
