    columns:
    - name: id
      description: A unique identifier for each logged notification. Primary key.
      data_type: VARCHAR
      primary_key: true
    - name: createdAt
      description: Records the date and time the notification log entry was created.
      data_type: VARCHAR
    - name: updatedAt
      description: The timestamp indicating when the notification log entry was last
        modified.
      data_type: VARCHAR
    - name: subscriptionId
      description: A unique identifier for the subscription associated with this notification
        log entry. Joins to Subscription.id.
      data_type: VARCHAR
      foreign_key: Subscription.id
    - name: notificationId
      description: The unique identifier assigned to each logged notification event.
      data_type: VARCHAR
    - name: cost
      description: The monetary cost incurred for sending this notification.
      data_type: VARCHAR
    - name: body
      description: The complete textual content or message body of the notification
        sent to the recipient.
      data_type: VARCHAR
    - name: subject
      description: The concise title or main topic of the notification recorded in
        the log.
      data_type: VARCHAR
    - name: email
      description: The email address to which this notification was sent.
      data_type: VARCHAR
    - name: phoneNumber
      description: The contact phone number to which the notification was sent.
      data_type: VARCHAR
    - name: units
      description: The numerical quantity of items, events, or resources associated
        with the notification log entry.
      data_type: VARCHAR
    - name: storefrontUserId
      description: The unique identifier for the user who received this notification.
        Joins to StorefrontUser.id.
      data_type: VARCHAR
      foreign_key: StorefrontUser.id
    - name: siteId
      description: Identifies the site associated with the recorded notification.
        Joins to Site.id.
      data_type: VARCHAR
      foreign_key: Site.id
  - name: Order
    type: table
    description: Records a customer's request to purchase specific products or services.
    columns:
    - name: id
      description: A unique identifier for each order. Primary key.
      data_type: VARCHAR
      primary_key: true
    - name: createdAt
      description: The date and time when the order was initially placed or recorded
        in the system.
      data_type: VARCHAR
    - name: updatedAt
      description: Records the exact date and time the order information was last
        modified or updated.
      data_type: VARCHAR
    - name: platformId
      description: The unique identifier for the order on the e-commerce platform
        (e.g., Shopify order ID).
      data_type: VARCHAR
    - name: deletedAt
      description: Timestamp of when the order was soft-deleted, marking it as inactive.
      data_type: VARCHAR
    - name: cancelledAt
      description: The date and time the order was cancelled.
      data_type: VARCHAR
    - name: platformNumber
      description: A unique numerical identifier for the order on the platform (e.g.,
        Shopify order number like
      data_type: VARCHAR
    - name: storefrontUserId
      description: Identifies the user who placed the order. Joins to StorefrontUser.id.
      data_type: VARCHAR
      foreign_key: StorefrontUser.id
    - name: deliveredAt
      description: The timestamp indicating when the order was successfully delivered
        to the customer.
      data_type: VARCHAR
    - name: fulfillAt
      description: The date and time an order is scheduled for fulfillment.
      data_type: VARCHAR
    - name: prepaidSubscriptionId
      description: The unique identifier for a prepaid subscription associated with
        this order. Joins to Subscription.id for prepaid subscriptions.
      data_type: VARCHAR
      foreign_key: Subscription.id
    - name: firstOrderInPrepaidSequence
      description: Boolean flag indicating if this order is the first order within
        a sequence of orders covered by a single prepaid payment.
      data_type: BOOLEAN
    - name: fulfillmentOrderCredit
      description: The monetary credit amount applied to an order during its fulfillment
        process, typically reflecting adjustments, partial refunds, or returns.
      data_type: FLOAT
    - name: note
      description: Contains any additional free-form information or special instructions
        related to the order.
      data_type: VARCHAR
    - name: processedAt
      description: The timestamp indicating when the order's processing was completed.
      data_type: VARCHAR
    - name: clientIp
      description: The IP address of the client's device used to place the order.
      data_type: VARCHAR
    - name: totalPrice
      description: The total monetary value of the order after all items, taxes, and
        discounts have been applied.
      data_type: FLOAT
    - name: siteId
      description: Identifies the site where the order was placed. Joins to Site.id.
      data_type: VARCHAR
      foreign_key: Site.id
    - name: appId
      description: Identifies the application system that initiated this order.
      data_type: VARCHAR
    - name: taxesIncluded
      description: Specifies whether the order's total amount already incorporates
        applicable taxes.
      data_type: BOOLEAN
    - name: taxExempt
      description: Indicates whether the order is exempt from sales tax.
      data_type: BOOLEAN
    - name: hashedBillingAddress
      description: A secure, irreversible representation of the customer's billing
        address for the order, primarily used for internal validation and fraud prevention.
      data_type: VARCHAR
    - name: hashedShippingAddress
      description: The one-way hashed version of the customer's shipping address,
        used for secure identification and privacy within the order record.
      data_type: VARCHAR
    - name: unhashedBillingAddress
      description: The plain-text billing address supplied by the customer for the
        given order.
      data_type: VARCHAR
    - name: unhashedShippingAddress
      description: The complete, unhashed physical address provided by the customer
        for the delivery of this order.
      data_type: VARCHAR
    - name: currencyCode
      description: The three-letter ISO 4217 code identifying the currency in which
        the order's financial amounts are denominated.
      data_type: VARCHAR
    - name: subscriptionId
      description: A unique identifier linking this order to a recurring subscription.
        Joins to Subscription.id.
      data_type: VARCHAR
      foreign_key: Subscription.id
    - name: shippingAddressId
      description: The unique ID identifying the shipping address for this order.
        Joins to Address.id.
      data_type: VARCHAR
      foreign_key: Address.id
    - name: name
      description: The name of the customer who placed the order.
      data_type: VARCHAR
  - name: OrderLineItem
    type: table
    description: Records a specific item, its quantity, and price within a customer's
      order.
    columns:
    - name: id
      description: A unique identifier for each distinct line item in an order. Primary
        key.
      data_type: VARCHAR
      primary_key: true
    - name: createdAt
      description: The date and time this order line item was created.
      data_type: VARCHAR
    - name: updatedAt
      description: The date and time this order line item was last updated.
      data_type: VARCHAR
    - name: productVariantId
      description: The unique identifier for the product variant in this line item.
        Joins to ProductVariant.id.
      data_type: VARCHAR
      foreign_key: ProductVariant.id
    - name: orderId
      description: The unique identifier for the order this line item belongs to.
        Joins to Order.id.
      data_type: VARCHAR
      foreign_key: Order.id
    - name: quantity
      description: The number of units of the product detailed in this order line
        item.
      data_type: INTEGER
    - name: platformId
      description: Identifies the line item ID on the e-commerce platform (e.g., Shopify
        line item ID).
      data_type: VARCHAR
    - name: priceWithoutDiscount
      description: The original, undiscounted unit price of the item as listed on
        this order line.
      data_type: VARCHAR
    - name: groupId
      description: A unique identifier used to group logically related order line
        items within or across orders.
      data_type: VARCHAR
    - name: subscriptionLineId
      description: The unique identifier for the subscription line item that generated
        this order entry. Joins to SubscriptionLine.id.
      data_type: VARCHAR
      foreign_key: SubscriptionLine.id
    - name: attributionGroupId
      description: A unique identifier linking this order line item to a specific
        attribution group for marketing and sales credit.
      data_type: VARCHAR
    - name: customAttributes
      description: Stores additional, flexible, and non-standardized attributes specific
        to this order line item.
      data_type: VARCHAR
    - name: currencyCode
      description: Specifies the currency used for the pricing of this individual
        order line item.
      data_type: VARCHAR
    - name: pricePresentmentCurrencyCode
      description: The ISO 4217 three-letter currency code representing the currency
        in which the item's price is presented to the customer.
      data_type: VARCHAR
    - name: pricePresentmentAmount
      description: The monetary amount representing the price presented or displayed
        to the customer for the order line item.
      data_type: VARCHAR
    - name: siteId
      description: Identifies the site linked to this order line item. Joins to Site.id.
      data_type: VARCHAR
      foreign_key: Site.id
  - name: PaymentMethod
    type: table
    description: Defines the acceptable methods for financial transactions within
      the business.
    columns:
    - name: id
      description: A unique system-generated identifier for each distinct payment
        method record.
      data_type: VARCHAR
      primary_key: true
    - name: createdAt
      description: Records the date and time the payment method was added to the system.
      data_type: VARCHAR
    - name: updatedAt
      description: The timestamp recording the last time this payment method's information
        was modified.
      data_type: VARCHAR
    - name: billingAddressId
      description: Identifies the billing address associated with this payment method.
      data_type: VARCHAR
    - name: storefrontUserId
      description: The unique identifier for the user account associated with this
        payment method on a particular storefront.
      data_type: VARCHAR
    - name: platformId
      description: The unique identifier for the payment platform associated with
        this payment method.
      data_type: VARCHAR
    - name: revokedAt
      description: The timestamp indicating when the payment method was revoked.
      data_type: VARCHAR
    - name: brand
      description: The specific brand name of the payment method, such as Visa, Mastercard,
        or PayPal.
      data_type: VARCHAR
    - name: lastDigits
      description: The final digits of the payment method used for identification
        and masked display.
      data_type: VARCHAR
    - name: expiryMonth
      description: Indicates the month in which the payment method will expire.
      data_type: VARCHAR
    - name: expiryYear
      description: The four-digit year when the payment method is no longer valid.
      data_type: VARCHAR
    - name: instrumentType
      description: Identifies the category of the payment instrument used, such as
        credit card, debit card, or bank transfer.
      data_type: VARCHAR
    - name: paypalAccountEmail
      description: The email address registered with the PayPal account associated
        with this payment method.
      data_type: VARCHAR
    - name: inactive
      description: Indicates whether this payment method is currently disabled or
        unavailable for use.
      data_type: BOOLEAN
    - name: skioRevoke
      description: Indicates if the payment method has been revoked for Skio services.
      data_type: BOOLEAN
  - name: Policy
    type: table
    description: Stores billing and delivery policies that define subscription intervals
      and cycle limits.
    columns:
    - name: id
      description: The unique identification number assigned to each policy. Primary
        key. Referenced by Subscription.billingPolicyId, Subscription.deliveryPolicyId,
        and Subscription.prepaidDeliveryPolicyId.
      data_type: VARCHAR
      primary_key: true
    - name: createdAt
      description: The date and time the policy was created.
      data_type: VARCHAR
    - name: updatedAt
      description: The date and time this policy record was last updated.
      data_type: VARCHAR
    - name: interval
      description: The specified time period for recurring policy activities (e.g.,
        DAY, WEEK, MONTH, YEAR).
      data_type: VARCHAR
    - name: intervalCount
      description: Specifies the number of intervals between billing or delivery cycles
        (e.g., 2 with WEEK interval means every 2 weeks).
      data_type: INTEGER
    - name: maxCycles
      description: The maximum number of billing/delivery cycles permitted for the
        policy.
      data_type: INTEGER
    - name: minCycles
      description: The minimum number of cycles required before cancellation is allowed.
      data_type: INTEGER
    - name: isMaxCycleV2
      description: Indicates whether this policy uses V2 max cycle business rules.
      data_type: BOOLEAN
  - name: Product
    type: table
    description: Stores comprehensive details for every product offered by the business.
    columns:
    - name: id
      description: A unique identifier for each product. Primary key. Referenced by
        ProductVariant.productId.
      data_type: VARCHAR
      primary_key: true
    - name: createdAt
      description: The date and time the product record was first created.
      data_type: VARCHAR
    - name: updatedAt
      description: Records the last date and time this product's information was modified.
      data_type: VARCHAR
    - name: siteId
      description: The unique ID for the site where the product is offered. Joins
        to Site.id.
      data_type: VARCHAR
      foreign_key: Site.id
    - name: platformId
      description: Identifies the product ID on the e-commerce platform (e.g., Shopify
        product ID).
      data_type: VARCHAR
    - name: slug
      description: The short, descriptive, and URL-safe text that identifies the product
        for use in its web address.
      data_type: VARCHAR
    - name: imageSrc
      description: The URL for the product's primary image.
      data_type: VARCHAR
    - name: title
      description: The short, descriptive name used to identify the product.
      data_type: VARCHAR
    - name: deletedAt
      description: Records the timestamp when a product was soft-deleted, indicating
        it is no longer active but retained for historical purposes or potential restoration.
      data_type: VARCHAR
    - name: status
      description: Indicates the product's current operational state or availability
        (e.g., ACTIVE, ARCHIVED, DRAFT).
      data_type: VARCHAR
    - name: isSwappable
      description: Indicates whether this product is eligible for exchange or swapping
        by a customer.
      data_type: BOOLEAN
    - name: canUpsell
      description: Indicates if this product provides an opportunity to upsell customers
        to a more expensive or feature-rich alternative.
      data_type: BOOLEAN
    - name: smsTitle
      description: The product's short, descriptive title intended for use in SMS
        messages.
      data_type: VARCHAR
    - name: smsOrder
      description: Indicates whether the product is available for purchase via SMS.
      data_type: INTEGER
    - name: swapTitle
      description: The title of the product when listed for exchange or swap.
      data_type: VARCHAR
    - name: isBuildable
      description: Indicates whether the product can be manufactured or assembled.
      data_type: BOOLEAN
    - name: hideOnEditProductsPage
      description: Controls whether this product is displayed on the product editing
        page.
      data_type: BOOLEAN
    - name: metafields
      description: Contains custom, structured data fields that provide additional
        product details beyond standard attributes.
      data_type: VARCHAR
    - name: hideOn1TimeUpsells
      description: Controls if the product is hidden when one-time upsell offers are
        displayed.
      data_type: BOOLEAN
    - name: oneTimeUpsellPercentageOff
      description: The percentage discount offered for a one-time upsell when a customer
        purchases this product.
      data_type: VARCHAR
    - name: limitOneTimeUpsellQuantity
      description: Maximum quantity of this product allowed when purchased as a one-time
        upsell.
      data_type: BOOLEAN
    - name: shopifyTags
      description: Tags assigned to the product for categorization, filtering, and
        search on Shopify.
      data_type: VARCHAR
    - name: description
      description: Provides a summary of the product's key features, specifications,
        and benefits.
      data_type: VARCHAR
    - name: images
      description: Holds all images associated with the product.
      data_type: VARCHAR
    - name: showProductForCustomerTags
      description: Determines if the product is shown to customers based on their
        associated tags.
      data_type: VARCHAR
    - name: publicationId
      description: Identifies the unique publication associated with this product.
      data_type: VARCHAR
  - name: ProductVariant
    type: table
    description: Represents a distinct and sellable version of a product, detailing
      its specific differentiating attributes such as size, color, or material.
    columns:
    - name: id
      description: A unique identifier for each distinct product variant. Primary
        key. Referenced by OrderLineItem.productVariantId and SubscriptionLine.productVariantId.
      data_type: VARCHAR
      primary_key: true
    - name: createdAt
      description: The exact date and time this product variant was initially created.
      data_type: VARCHAR
    - name: updatedAt
      description: The timestamp of the most recent modification made to this product
        variant record.
      data_type: VARCHAR
    - name: price
      description: The selling price of this specific product variant.
      data_type: VARCHAR
    - name: title
      description: A descriptive name for the specific product variant (e.g., "Small
        / Blue").
      data_type: VARCHAR
    - name: platformId
      description: Identifies the variant ID on the e-commerce platform (e.g., Shopify
        variant ID).
      data_type: VARCHAR
    - name: productId
      description: Identifies the parent product this variant belongs to. Joins to
        Product.id.
      data_type: VARCHAR
      foreign_key: Product.id
    - name: sku
      description: A unique Stock Keeping Unit (SKU) assigned to each product variant
        for inventory management.
      data_type: VARCHAR
    - name: deletedAt
      description: The timestamp indicating when the ProductVariant was soft-deleted.
      data_type: VARCHAR
    - name: image
      description: The visual representation of this specific product variant.
      data_type: VARCHAR
    - name: compareAtPrice
      description: The original or higher price of the product variant, displayed
        for comparison against the current selling price to show a discount.
      data_type: VARCHAR
    - name: outOfStockAt
      description: Indicates the precise date and time when this product variant was
        registered as out of stock.
      data_type: VARCHAR
    - name: marketPrices
      description: The prevailing market prices for this specific product variant.
      data_type: VARCHAR
    - name: billingPriceOverride
      description: The custom billing price for this product variant, overriding the
        system's standard calculated price.
      data_type: VARCHAR
    - name: enableOneTimeUpsell
      description: Indicates whether a one-time upsell offer can be presented to customers
        purchasing this product variant.
      data_type: BOOLEAN
    - name: hideOnEditProduct
      description: Indicates whether this product variant should be hidden from view
        when editing its parent product.
      data_type: BOOLEAN
    - name: siteId
      description: The site where this product variant is offered. Joins to Site.id.
      data_type: VARCHAR
      foreign_key: Site.id
  - name: Site
    type: table
    description: Stores identifying and descriptive information for each merchant/store
      using the platform.
    columns:
    - name: id
      description: The unique identifier for a specific site. Primary key. Referenced
        by most other tables via siteId.
      data_type: VARCHAR
      primary_key: true
    - name: createdAt
      description: The date and time the site record was created in the system.
      data_type: VARCHAR
    - name: updatedAt
      description: The date and time the site's record was last modified.
      data_type: VARCHAR
    - name: domain
      description: Identifies the unique internet domain name for the respective site
        (e.g., mystore.myshopify.com).
      data_type: VARCHAR
    - name: url
      description: The web address of the site.
      data_type: VARCHAR
    - name: currencyCode
      description: The three-letter ISO 4217 code identifying the site's main operating
        currency.
      data_type: VARCHAR
    - name: email
      description: The official contact email address for the site.
      data_type: VARCHAR
    - name: name
      description: The primary name used to identify and refer to a specific business
        site or location.
      data_type: VARCHAR
    - name: slug
      description: The unique, URL-friendly string used in the site's web address
        for readability and SEO.
      data_type: VARCHAR
    - name: hostname
      description: The unique network identifier for the server hosting the site or
        application.
      data_type: VARCHAR
    - name: syncing
      description: Describes whether the site is currently undergoing or configured
        for data synchronization activities.
      data_type: BOOLEAN
    - name: snippetsSyncing
      description: Indicates the synchronization status of site-specific code snippets.
      data_type: BOOLEAN
    - name: notificationEmail
      description: The email address designated to receive notifications for this
        site.
      data_type: VARCHAR
    - name: notificationEmailUnderReview
      description: Indicates whether the site's primary notification email address
        is currently undergoing a verification or review process.
      data_type: BOOLEAN
    - name: urlShortener
      description: This column identifies the service or tool used by the site to
        create short, shareable, and trackable versions of longer web addresses.
      data_type: VARCHAR
    - name: freeTrialEndsAt
      description: The date and time when the free trial period for a site expires.
      data_type: VARCHAR
    - name: isPaying
      description: Indicates whether the site is currently subscribed to a paid service
        or plan.
      data_type: BOOLEAN
    - name: plivoPhoneNumber
      description: The Plivo phone number associated with the site for all communication.
      data_type: VARCHAR
    - name: contactFirstName
      description: The first name of the primary contact person associated with the
        site.
      data_type: VARCHAR
    - name: contactLastName
      description: This column stores the last name of the primary contact person
        associated with a specific site.
      data_type: VARCHAR
    - name: klaviyoPublicKey
      description: The public API key that identifies the Klaviyo account associated
        with this site for data integration and tracking.
      data_type: VARCHAR
    - name: klaviyoPrivateKey
      description: The confidential API key used by the site for secure authentication
        and interaction with the Klaviyo platform.
      data_type: VARCHAR
    - name: transactionCut
      description: The percentage of each transaction's value that the site retains
        as revenue.
      data_type: VARCHAR
    - name: groupRevenueCut
      description: The portion of a site's total revenue that the parent group retains.
      data_type: VARCHAR
    - name: hideGroupSubscriptions
      description: Determines if group subscriptions are hidden from display across
        the entire site.
      data_type: BOOLEAN
    - name: backfilling
      description: Indicates whether a previously vacant resource or requirement at
        the site is being filled.
      data_type: BOOLEAN
    - name: taxIncluded
      description: A flag indicating whether displayed prices on this site incorporate
        applicable taxes.
      data_type: BOOLEAN
    - name: roundUpAnchors
      description: Holds the hyperlinks included in the site's round-up content.
      data_type: BOOLEAN
    - name: scriptLoadBehavior
      description: Defines the intended behavior for how client-side scripts are loaded
        on the site, influencing its performance and user experience.
      data_type: VARCHAR
    - name: transactionFee
      description: The fee charged by the site for processing a transaction.
      data_type: VARCHAR
    - name: stripeSubscriptionItemId
      description: The unique Stripe identifier for a specific product or service
        included in this site's subscription.
      data_type: VARCHAR
    - name: showSellingPlanId
      description: The unique identifier for the selling plan that is designated to
        be displayed or actively associated with the site.
      data_type: BOOLEAN
    - name: quarterlyOverride
      description: A manually entered value that overrides the default or calculated
        quarterly figure for a specific site.
      data_type: BOOLEAN
    - name: betaTesting
      description: Indicates the current beta testing status of the site.
      data_type: BOOLEAN
    - name: transactionFeeAppliesToGroup
      description: Indicates whether the transaction fee for this site is applied
        to a group of items or transactions.
      data_type: BOOLEAN
    - name: orderPrefix
      description: The unique alphanumeric code used to differentiate order numbers
        originating from this specific site.
      data_type: VARCHAR
    - name: inventoryPolicy
      description: Specifies the strategy for managing inventory levels and replenishment
        at this site.
      data_type: VARCHAR
    - name: groupDiscountOffOneTime
      description: The value of the one-time group discount offered by the site.
      data_type: BOOLEAN
    - name: featureSMSRemindersWithActions
      description: Determines if the site sends SMS reminders that include calls to
        action.
      data_type: BOOLEAN
    - name: updateShippingOnSubscriptionChanges
      description: Indicates whether to automatically update customer shipping information
        when their subscription changes on this site.
      data_type: BOOLEAN
    - name: vCardUrl
      description: URL of the vCard file containing contact information for the site.
      data_type: VARCHAR
    - name: gorgiasAccountName
      description: Identifies the Gorgias helpdesk account name associated with the
        site.
      data_type: VARCHAR
    - name: gorgiasRefreshToken
      description: The refresh token used to obtain new access tokens for the site's
        integration with Gorgias.
      data_type: VARCHAR
    - name: pushWeekendOrders
      description: Indicates if the site automatically pushes orders placed over the
        weekend for processing.
      data_type: BOOLEAN
    - name: billMigratedSubs
      description: The count of subscribers on this site whose billing has been migrated.
      data_type: BOOLEAN
    - name: billingWindow
      description: The defined time interval for the site's billing cycle.
      data_type: VARCHAR
    - name: useRechargeTags
      description: Specifies if the site utilizes tags from the Recharge Payments
        platform.
      data_type: BOOLEAN
    - name: inviteLinkOverride
      description: The URL to use as a custom invite link for this site, if different
        from the system-generated default.
      data_type: VARCHAR
    - name: hideChooseSubscription
      description: Controls whether the site hides the option for users to select
        a subscription plan.
      data_type: BOOLEAN
    - name: storefrontAccessToken
      description: A security token enabling programmatic access to a site's public
        storefront data and functionality.
      data_type: VARCHAR
    - name: sitewidePortalPercentageOff
      description: The sitewide percentage discount applicable when accessing the
        site via a specific portal.
      data_type: VARCHAR
    - name: hideOrderStatusWidget
      description: Indicates whether the order status widget is suppressed from display
        on the site.
      data_type: BOOLEAN
    - name: giftOnSkip
      description: Configures whether the site provides a gift to users who choose
        to skip an offering or interaction.
      data_type: BOOLEAN
    - name: multipassSecret
      description: The confidential key enabling the site's multipass authentication
        functionality.
      data_type: VARCHAR
    - name: lastRecurringBillingLock
      description: Records the timestamp of the last time the site's recurring billing
        process was locked, marking its completion and preventing reprocessing.
      data_type: VARCHAR
    - name: cancelSubscriptionAfterAttempts
      description: The number of failed payment attempts after which a subscription
        is automatically cancelled.
      data_type: INTEGER
    - name: subscriptionBillingRetryInterval
      description: Defines the time period the system waits before retrying a failed
        subscription billing charge.
      data_type: INTEGER
    - name: contactEmail
      description: The primary email address for general contact and inquiries related
        to the site.
      data_type: VARCHAR
    - name: ianaTimezone
      description: Provides the IANA timezone identifier for the site, ensuring accurate
        local time and date calculations.
      data_type: VARCHAR
    - name: showShippingCalculationButton
      description: Controls the visibility of the shipping calculation button on the
        site.
      data_type: BOOLEAN
    - name: mergeSubscriptions
      description: Determines whether the site automatically merges separate user
        subscriptions into a single, unified subscription.
      data_type: BOOLEAN
    - name: skioSmsModifyOptionsMapping
      description: Defines the site-specific configuration for mapping options used
        to modify SMS messages within the Skio platform.
      data_type: VARCHAR
    - name: twilioMessagingServiceSid
      description: Identifies the unique Twilio Messaging Service used by this site
        to handle its SMS and MMS communications.
      data_type: VARCHAR
    - name: lastRecurringBillingNotificationLock
      description: Timestamp indicating when the site last applied a temporary restriction
        on sending recurring billing notifications.
      data_type: VARCHAR
    - name: migrationId
      description: The unique identifier for the data migration event associated with
        this site.
      data_type: VARCHAR
    - name: impactKey
      description: Identifies the primary impact classification or type for the site.
      data_type: VARCHAR
    - name: impactSid
      description: Unique identifier for an impact record associated with the site.
      data_type: VARCHAR
    - name: showNewCustomerPortal
      description: Indicates whether the new customer portal should be displayed for
        this site.
      data_type: BOOLEAN
    - name: zendeskToken
      description: The authentication token enabling the site to interact with Zendesk
        services.
      data_type: VARCHAR
    - name: syncAddressesToShopify
      description: Indicates whether addresses associated with this site are synchronized
        to Shopify.
      data_type: BOOLEAN
    - name: allowCustomerDiscountCodeStacking
      description: Specifies whether customers can apply multiple discount codes to
        a single order on the site.
      data_type: BOOLEAN
    - name: settings
      description: Specifies the configurable parameters and preferences for the site.
      data_type: VARCHAR
    - name: syncingRules
      description: Specifies the exact parameters and logic for synchronizing data
        to and from the site.
      data_type: BOOLEAN
    - name: showPauseInDashboard
      description: Controls the display of the "pause site" feature within the site's
        dashboard.
      data_type: BOOLEAN
    - name: showPauseInCustomerPortal
      description: Specifies whether the option to pause services or subscriptions
        is made visible to customers within their self-service portal.
      data_type: BOOLEAN
    - name: termsOfService
      description: Details the official legal agreement outlining user responsibilities
        and site policies.
      data_type: VARCHAR
    - name: autoMergeBilling
      description: Determines whether the billing for this site is automatically merged
        with other associated billing records.
      data_type: BOOLEAN
    - name: productDiscountFunctionId
      description: The unique identifier for the product discount calculation logic
        applied to products on this site.
      data_type: VARCHAR
    - name: gorgiasDashboardActionToken
      description: Token used by the site to securely authenticate and execute actions
        within the Gorgias customer service dashboard.
      data_type: VARCHAR
    - name: installedApps
      description: Lists the software applications currently installed and active
        on the site, essential for understanding site capabilities and dependencies.
      data_type: VARCHAR
    - name: smartCarouselSettings
      description: This column stores the advanced configuration parameters that control
        the behavior and features of the site's smart carousel.
      data_type: VARCHAR
    - name: dunningSettings
      description: Configures the site's process for handling and pursuing overdue
        payments.
      data_type: VARCHAR
    - name: useFlycodeDunning
      description: Indicates whether the site uses the Flycode system for managing
        overdue payments.
      data_type: BOOLEAN
    - name: lastMigrationTime
      description: The date and time this site was last migrated to a new platform
        or environment.
      data_type: VARCHAR
    - name: skioUninstalled
      description: Documents the uninstallation of the Skio application or service
        from the site.
      data_type: BOOLEAN
    - name: defaultCopyTranslationId
      description: Identifies the default translation to be used for all copy content
        on the site.
      data_type: VARCHAR
    - name: stripeSaasFee
      description: The fee levied by Stripe for processing payments related to the
        site's Software as a Service platform.
      data_type: VARCHAR
    - name: previewSettings
      description: Stores the configuration settings that define how the site is rendered
        for preview purposes.
      data_type: VARCHAR
    - name: skioSmsSettings
      description: Specifies the SMS notification and messaging settings for the Skio
        service on the site.
      data_type: VARCHAR
    - name: qaAuthSettings
      description: Manages the authentication settings for quality assurance (QA)
        processes on the site.
      data_type: VARCHAR
    - name: isMigrating
      description: A boolean flag indicating if the site's data or services are presently
        being migrated to a different server or platform.
      data_type: BOOLEAN
    - name: volumeDiscountShopifyFunctionSettings
      description: Stores the configuration settings for the Shopify function that
        manages and applies volume-based discounts on the site.
      data_type: VARCHAR
    - name: globalBanner
      description: Stores the content for the primary banner displayed consistently
        across all pages of the website for site-wide announcements or branding.
      data_type: VARCHAR
    - name: taxShipping
      description: Indicates if shipping is taxable for this site.
      data_type: BOOLEAN
    - name: defaultPermissionSettings
      description: Defines the default access rights and security permissions automatically
        applied to new content or user accounts within the site.
      data_type: VARCHAR
    - name: dbabDiscountShopifyFunctionSettings
      description: Configuration settings for the Shopify discount function implemented
        on this site.
      data_type: VARCHAR
    - name: hasActiveShopifySubscription
      description: Indicates whether the associated site currently has an active Shopify
        subscription.
      data_type: BOOLEAN
    - name: customerPortalVersion
      description: Indicates the version of the customer portal implemented on the
        site.
      data_type: INTEGER
    - name: collectionSettings
      description: Specifies the display and organizational settings for all collections
        of content or products presented on the site.
      data_type: VARCHAR
    - name: isShopifyTokenOk
      description: Denotes the current validity status of the Shopify API token used
        by the site for integration.
      data_type: BOOLEAN
    - name: cpv3Settings
      description: Holds the configuration settings for the site's Content Protection
        Version 3 implementation.
      data_type: VARCHAR
    - name: billingTiers
      description: Defines the available billing plans or subscription tiers for the
        site.
      data_type: VARCHAR
    - name: isPlanPartnerDevelopment
      description: Flag indicating if the site is part of a strategic plan for partner
        development initiatives.
      data_type: BOOLEAN
    - name: planPublicDisplayName
      description: The customer-visible name for the plan chosen for the site.
      data_type: VARCHAR
    - name: isPlanShopifyPlus
      description: Indicates if the site is subscribed to the Shopify Plus plan.
      data_type: BOOLEAN
    - name: webhookRateLimits
      description: Defines the constraints on the frequency or volume of webhook notifications
        allowed for a particular site.
      data_type: VARCHAR
    - name: stripeLoyaltySubscriptionItemId
      description: The Stripe ID for the loyalty subscription item associated with
        this site.
      data_type: VARCHAR
    - name: runningKlaviyoBackfill
      description: Indicates whether a backfill process is currently active to populate
        historical data into Klaviyo for the site.
      data_type: BOOLEAN
    - name: awsPhoneNumber
      description: The Amazon Web Services contact phone number for the site.
      data_type: VARCHAR
    - name: shopifyFunctionIds
      description: Unique identifiers for Shopify functions or applications configured
        for the site.
      data_type: VARCHAR
    - name: showPauseInCutomerPortal
      description: Controls the visibility of the 'pause' feature or status within
        the customer portal.
      data_type: BOOLEAN
  - name: StorefrontUser
    type: table
    description: The StorefrontUser table captures details for customers accessing
      and interacting with the company's online retail storefront.
    columns:
    - name: id
      description: A unique identifier for each user within the storefront system.
        Primary key. Referenced by Address.storefrontUserId, AuditLog.storefrontUserId,
        NotificationLog.storefrontUserId, Order.storefrontUserId, Subscription.storefrontUserId,
        and Subscription.prepaidGiftRecipientId.
      data_type: VARCHAR
      primary_key: true
    - name: createdAt
      description: The date and time the StorefrontUser account was created.
      data_type: VARCHAR
    - name: updatedAt
      description: Stores the timestamp of the most recent update to the StorefrontUser's
        profile or associated data.
      data_type: VARCHAR
    - name: cognitoUsername
      description: The unique username assigned to the storefront user in AWS Cognito.
      data_type: VARCHAR
    - name: email
      description: The email address serving as the primary identifier and contact
        point for the storefront user's account.
      data_type: VARCHAR
    - name: phoneNumber
      description: The primary contact phone number for the StorefrontUser.
      data_type: VARCHAR
    - name: siteId
      description: The unique identifier for the site this user belongs to. Joins
        to Site.id.
      data_type: VARCHAR
      foreign_key: Site.id
    - name: platformId
      description: The user's ID on the e-commerce platform (e.g., Shopify customer
        ID).
      data_type: VARCHAR
    - name: firstName
      description: The given name of the user associated with the StorefrontUser account.
      data_type: VARCHAR
    - name: lastName
      description: The family name of the individual user associated with the storefront.
      data_type: VARCHAR
    - name: userId
      description: A unique identifier for a user within the storefront system.
      data_type: VARCHAR
    - name: storefrontUserGroupId
      description: Identifies the group a storefront user belongs to, enabling tailored
        experiences, pricing, or access.
      data_type: VARCHAR
    - name: cognitoUserId
      description: AWS Cognito's unique identifier for the storefront user.
      data_type: VARCHAR
    - name: storefrontUserGroupStatus
      description: The current status of a storefront user's group membership.
      data_type: VARCHAR
    - name: groupDiscountCode
      description: The unique code that a StorefrontUser can apply to receive a group-specific
        discount.
      data_type: VARCHAR
    - name: redactedAt
      description: The timestamp indicating when a StorefrontUser's data was redacted.
      data_type: VARCHAR
    - name: shopifyTags
      description: Shopify-specific tags assigned to the storefront user for categorization
        and segmentation.
      data_type: VARCHAR
    - name: qaToken
      description: A token used to identify or provide special access for quality
        assurance and testing purposes to a StorefrontUser account.
      data_type: VARCHAR
    - name: qaTokenUpdatedAt
      description: The timestamp when the storefront user's Quality Assurance (QA)
        token was last updated.
      data_type: VARCHAR
    - name: removedAt
      description: Stores the date and time a StorefrontUser was removed or deactivated
        from the system.
      data_type: VARCHAR
    - name: backupPaymentMethodId
      description: The ID of the storefront user's backup payment method.
      data_type: VARCHAR
    - name: platformCreatedAt
      description: The timestamp when the storefront user's account was created on
        the platform.
      data_type: VARCHAR
    - name: amountSpent
      description: The total amount of money the user has spent across all transactions
        on the storefront.
      data_type: VARCHAR
    - name: numberOfOrders
      description: The total number of orders placed by the storefront user.
      data_type: INTEGER
    - name: amountSpentCurrencyCode
      description: The ISO 4217 currency code indicating the currency of the amount
        spent by the storefront user.
      data_type: VARCHAR
    - name: creditDiscountCode
      description: The unique identifier for a credit or discount offer associated
        with the StorefrontUser's account.
      data_type: VARCHAR
    - name: isBlacklisted
      description: Indicates if the storefront user is blacklisted from accessing
        specific platform services or features.
      data_type: BOOLEAN
    - name: birthday
      description: Captures the user's birth date to facilitate age verification and
        enable personalized birthday promotions.
      data_type: VARCHAR
    - name: tempSmsTransactionalOptIn
      description: Indicates a storefront user's temporary consent to receive transactional
        SMS messages.
      data_type: BOOLEAN
    - name: smsTransactionalOptIn
      description: Indicates whether the storefront user has opted in to receive transactional
        SMS messages.
      data_type: BOOLEAN
    - name: emailLower
      description: The user's email address, stored in a lowercase format to ensure
        consistency and facilitate efficient searches.
      data_type: VARCHAR
    - name: numberOrOrders
      description: The total number of orders placed by the storefront user.
      data_type: INTEGER
  - name: Subscription
    type: table
    description: Captures and tracks the essential data for every customer's ongoing
      or historical service subscription.
    columns:
    - name: id
      description: A unique identifier for each subscription. Primary key. Referenced
        by AnalyticsStateChangeTable.subscriptionId, AuditLog.subscriptionId, BillingAttempt.subscriptionId,
        CancelFlowV2Session.subscriptionId, NotificationLog.subscriptionId, Order.subscriptionId,
        Order.prepaidSubscriptionId, SubscriptionLine.subscriptionId, and SubscriptionLine.prepaidSubscriptionId.
      data_type: VARCHAR
      primary_key: true
    - name: createdAt
      description: Timestamp indicating the moment the subscription was first created.
      data_type: VARCHAR
    - name: updatedAt
      description: The most recent date a change was made to this subscription.
      data_type: VARCHAR
    - name: billingPolicyId
      description: The unique identifier for the billing policy that defines the charging
        and payment terms. Joins to Policy.id.
      data_type: VARCHAR
      foreign_key: Policy.id
    - name: deliveryPolicyId
      description: Specifies the delivery policy that dictates how and when the subscribed
        product or service is delivered. Joins to Policy.id.
      data_type: VARCHAR
      foreign_key: Policy.id
    - name: shippingAddressId
      description: The unique identifier for the shipping address associated with
        this subscription. Joins to Address.id.
      data_type: VARCHAR
      foreign_key: Address.id
    - name: paymentMethodId
      description: Identifies the payment method linked to this subscription (e.g.,
        Shopify payment method ID).
      data_type: VARCHAR
    - name: deliveryPrice
      description: The price charged for delivering the items or services within this
        subscription.
      data_type: VARCHAR
    - name: status
      description: Indicates the current operational status of the subscription (e.g.,
        ACTIVE, PAUSED, CANCELLED).
      data_type: VARCHAR
    - name: currencyCode
      description: Indicates the three-letter ISO 4217 code identifying the currency
        for the subscription's pricing.
      data_type: VARCHAR
    - name: nextBillingDate
      description: The date when the next payment for the subscription is due.
      data_type: VARCHAR
    - name: storefrontUserId
      description: The unique identifier for the user who owns this subscription.
        Joins to StorefrontUser.id.
      data_type: VARCHAR
      foreign_key: StorefrontUser.id
    - name: idempotencyKey
      description: A unique token that guarantees a subscription creation or modification
        request is processed exactly once, safeguarding against redundant operations.
      data_type: VARCHAR
    - name: platformId
      description: Identifies the subscription ID on the e-commerce platform (e.g.,
        Shopify subscription contract ID).
      data_type: VARCHAR
    - name: cancelledAt
      description: The date and time when the subscription was cancelled.
      data_type: VARCHAR
    - name: statusContext
      description: The supplementary information detailing the current state of the
        subscription (e.g., cancellation reason).
      data_type: VARCHAR
    - name: lastBillingAttemptAt
      description: Records the timestamp of the last billing attempt for the subscription.
      data_type: VARCHAR
    - name: migrationIndex
      description: Indicates the migration stage or group identifier for the subscription.
      data_type: INTEGER
    - name: customAttributes
      description: Captures flexible, additional information unique to each subscription
        beyond standard details.
      data_type: VARCHAR
    - name: prepaidDeliveryPolicyId
      description: The unique identifier for the prepaid delivery policy applied to
        this subscription. Joins to Policy.id.
      data_type: VARCHAR
      foreign_key: Policy.id
    - name: prepaidProductPricesPerDelivery
      description: The prepaid price for individual products included in each subscription
        delivery.
      data_type: VARCHAR
    - name: cyclesCompleted
      description: The number of billing cycles that have been successfully completed
        for this subscription.
      data_type: INTEGER
    - name: deliveryPriceOverride
      description: The manually specified delivery price that overrides the standard
        or calculated delivery cost for this subscription.
      data_type: INTEGER
    - name: creditPerOrder
      description: The amount of credit provided for each order placed under the subscription.
      data_type: VARCHAR
    - name: metadata
      description: Captures arbitrary, non-standard attributes or custom data associated
        with the subscription.
      data_type: VARCHAR
    - name: pausedAt
      description: The date and time a subscription was temporarily suspended.
      data_type: VARCHAR
    - name: siteId
      description: The unique identifier for the site this subscription belongs to.
        Joins to Site.id.
      data_type: VARCHAR
      foreign_key: Site.id
    - name: prepaidGiftRecipientId
      description: The ID of the user designated as the recipient of a prepaid gift
        subscription. Joins to StorefrontUser.id.
      data_type: VARCHAR
      foreign_key: StorefrontUser.id
    - name: originOrderId
      description: The unique identifier of the order that led to the creation of
        this subscription. Joins to Order.id.
      data_type: VARCHAR
      foreign_key: Order.id
    - name: dunningStoryId
      description: References the specific dunning story or sequence of overdue payment
        notifications configured for this subscription.
      data_type: VARCHAR
    - name: note
      description: Records supplementary information, special conditions, or internal
        comments pertaining to the subscription.
      data_type: VARCHAR
    - name: isPickup
      description: Indicates if the customer will pick up their subscription order.
      data_type: BOOLEAN
    - name: isDigital
      description: Indicates whether the subscription is for a digital product or
        service.
      data_type: BOOLEAN
    - name: streakCount
      description: The number of consecutive periods the subscription has been active.
      data_type: INTEGER
    - name: streakExpiresAt
      description: The specific date and time when the user's current consecutive
        activity streak, linked to their subscription, will expire if the necessary
        condition for its continuation is not met.
      data_type: VARCHAR
    - name: churnScore
      description: A numerical value representing the calculated probability that
        a subscription will be canceled.
      data_type: VARCHAR
    - name: churnPredictedAt
      description: The date and time at which a customer's subscription was predicted
        to be at risk of churn.
      data_type: VARCHAR
    - name: churnRiskReasons
      description: The specific reasons or factors identified as contributing to a
        subscriber's elevated risk of cancelling their subscription.
      data_type: VARCHAR
    - name: skipCycleBillingDate
      description: The specific billing date within a subscription cycle that has
        been marked to be skipped.
      data_type: VARCHAR
    - name: maxStreakCount
      description: The maximum consecutive period, in days, a subscription was active.
      data_type: INTEGER
  - name: SubscriptionLine
    type: table
    description: Describes each product or service included in a customer's subscription.
    columns:
    - name: id
      description: The unique identifier for a specific line item within a subscription.
        Primary key. Referenced by OrderLineItem.subscriptionLineId.
      data_type: VARCHAR
      primary_key: true
    - name: updatedAt
      description: Records the date and time when any detail of this subscription
        line was last updated.
      data_type: VARCHAR
    - name: createdAt
      description: The date and time this specific subscription line was created.
      data_type: VARCHAR
    - name: subscriptionId
      description: Identifies the parent subscription this line item belongs to. Joins
        to Subscription.id.
      data_type: VARCHAR
      foreign_key: Subscription.id
    - name: priceWithoutDiscount
      description: The price of the subscription line item before any discounts are
        applied.
      data_type: VARCHAR
    - name: quantity
      description: The number of units or services specified for this subscription
        line.
      data_type: INTEGER
    - name: sellingPlanId
      description: The unique identifier for the selling plan (e.g., monthly subscription,
        one-time purchase) applied to this line item.
      data_type: VARCHAR
    - name: productVariantId
      description: The unique identifier for the product variant included in this
        subscription line. Joins to ProductVariant.id.
      data_type: VARCHAR
      foreign_key: ProductVariant.id
    - name: platformId
      description: Identifies the line item ID on the e-commerce platform (e.g., Shopify
        subscription line ID).
      data_type: VARCHAR
    - name: taxable
      description: Indicates whether this subscription line item is subject to sales
        or other applicable taxes.
      data_type: BOOLEAN
    - name: groupId
      description: Identifies the group to which this subscription line belongs.
      data_type: VARCHAR
    - name: reChargeId
      description: The unique identifier from the ReCharge subscription platform for
        this line item (used during migrations).
      data_type: VARCHAR
    - name: boldId
      description: The unique identifier from Bold subscriptions for this line item
        (used during migrations).
      data_type: VARCHAR
    - name: removedAt
      description: The timestamp indicating when the subscription line was logically
        removed or deactivated from the subscription.
      data_type: VARCHAR
    - name: ordersRemaining
      description: The quantity of items or services remaining to be fulfilled for
        this subscription line.
      data_type: INTEGER
    - name: isPrepaid
      description: Indicates if the payment for this subscription line was received
        in advance of the service period.
      data_type: BOOLEAN
    - name: prepaidSubscriptionId
      description: Links this subscription line to its associated prepaid subscription.
        Joins to Subscription.id.
      data_type: VARCHAR
      foreign_key: Subscription.id
    - name: customAttributes
      description: A flexible collection of additional key-value attributes providing
        extended, non-standard information about the subscription line.
      data_type: VARCHAR
    - name: titleOverride
      description: The custom display title for the subscription line item, replacing
        its default product title.
      data_type: VARCHAR
    - name: legacySubscriptionId
      description: The identifier for the subscription from a prior system to which
        this subscription line belongs.
      data_type: VARCHAR
    - name: siteId
      description: Identifies the site to which this subscription line applies. Joins
        to Site.id.
      data_type: VARCHAR
      foreign_key: Site.id
